<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SNH — Вход в децентрализованную сеть</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #ffffff;
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.2) 0%, rgba(0, 0, 0, 0) 70%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .glass-card {
            background: rgba(12, 12, 16, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            transition: all 0.2s;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .btn-primary {
            background: linear-gradient(95deg, #7c3aed, #a855f7);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            font-size: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: #0c0c0f;
            border: 1.5px solid #2a2a2e;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .input-field:focus {
            outline: none;
            border-color: #a855f7;
        }

        .auth-card {
            padding: 40px 32px;
            text-align: center;
        }

        .warning-box {
            background: rgba(251,191,36,0.1);
            border-left: 3px solid #f59e0b;
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1f;
            backdrop-filter: blur(12px);
            border: 1px solid #a855f7;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 200;
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #0f0f12;
            border-radius: 40px;
            padding: 28px;
            max-width: 460px;
            width: 90%;
            border: 1px solid #a855f7;
        }

        .key-box {
            background: #00000055;
            padding: 12px;
            border-radius: 20px;
            font-family: monospace;
            word-break: break-all;
            font-size: 0.75rem;
            margin: 16px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card auth-card">
        <div class="logo">SNH</div>
        <p style="color: #a1a1aa; margin-bottom: 28px;">децентрализованная сеть на блокчейне</p>
        <div class="warning-box">
            🔐 Приватный ключ = ваш пароль. Сохраните его! Потеря = потеря аккаунта.
        </div>
        <input type="text" id="regNickname" class="input-field" placeholder="👤 Ваш никнейм (при создании)">
        <input type="text" id="regPrivateKey" class="input-field" placeholder="🔑 Приватный ключ (оставьте пустым для нового)">
        <button id="loginActionBtn" class="btn-primary">🚀 Войти / Создать аккаунт</button>
        <p style="font-size: 0.7rem; color: #6b7280; margin-top: 24px;">📡 Посты в блокчейне Nostr. Бесплатно. Навсегда.</p>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<div id="keyModal" class="modal">
    <div class="modal-card">
        <div style="display: flex; justify-content: space-between;">
            <h3>🔐 Ваш секретный ключ</h3>
            <button id="closeModalBtn" style="background: none; border: none; color: white; font-size: 28px; cursor: pointer;">&times;</button>
        </div>
        <p style="margin: 16px 0 8px;">Сохраните этот ключ. Это ваш пароль навсегда.</p>
        <div id="modalKeyText" class="key-box"></div>
        <button id="copyKeyBtn" class="btn-primary" style="width: 100%; margin-bottom: 12px;">📋 Копировать ключ</button>
        <button id="confirmKeyBtn" class="btn-primary" style="width: 100%; background: linear-gradient(95deg, #3b82f6, #7c3aed);">✅ Я сохранил, войти</button>
    </div>
</div>

<script src="https://unpkg.com/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
<script>
    // Константы для работы с Nostr
    const RELAYS = [
        'wss://relay.damus.io',
        'wss://nos.lol',
        'wss://relay.nostr.band',
        'wss://relay.snort.social',
        'wss://relay.primal.net',
        'wss://offchain.pub'
    ];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.display = 'block';
        toast.style.background = isError ? '#991b1bdd' : '#18181bdd';
        toast.style.borderColor = isError ? '#ef4444' : '#a855f7';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function generatePrivateKey() {
        return window.nostr.generatePrivateKey();
    }

    function getPublicKey(priv) {
        try { return window.nostr.getPublicKey(priv); } catch(e) { return null; }
    }

    function isValidHex(str) {
        return /^[0-9a-fA-F]{64}$/.test(str);
    }

    function normalizePrivateKey(input) {
        if (!input) return null;
        input = input.trim();
        if (isValidHex(input)) return input;
        try {
            if (input.startsWith('nsec1')) {
                const decoded = window.nostr.nip19.decode(input);
                if (decoded.type === 'nsec') return decoded.data;
            }
        } catch(e) {}
        return null;
    }

    async function publishProfile(privateKey, publicKey, nickname) {
        const profileEvent = {
            kind: 0,
            created_at: Math.floor(Date.now() / 1000),
            tags: [],
            content: JSON.stringify({ name: nickname, display_name: nickname, about: 'Пользователь SNH' }),
            pubkey: publicKey
        };
        profileEvent.id = await window.nostr.getEventHash(profileEvent);
        profileEvent.sig = await window.nostr.signEvent(profileEvent, privateKey);
        for (const url of RELAYS) {
            try { const relay = await window.nostr.relayConnect(url); await relay.publish(profileEvent); } catch(e) {}
        }
        return true;
    }

    // Сохранение данных в localStorage
    function saveToStorage(priv, nick) {
        localStorage.setItem('snh_priv', priv);
        localStorage.setItem('snh_nick', nick);
    }

    // ОСНОВНАЯ ФУНКЦИЯ: переход на основной экран
    function goToMainScreen(privateKey, nickname, publicKey) {
        // Сохраняем данные
        saveToStorage(privateKey, nickname);
        
        // Формируем URL с параметрами для основного экрана
        const params = new URLSearchParams({
            priv: privateKey,
            nick: nickname,
            pub: publicKey
        });
        
        // Переход на основной экран
        window.location.href = `osn-jekran.html?${params.toString()}`;
    }

    async function registerNewUser(nickname) {
        if (!nickname.trim()) { showToast('❌ Укажите никнейм', true); return; }
        const newPriv = generatePrivateKey();
        const newPub = getPublicKey(newPriv);
        
        const modal = document.getElementById('keyModal');
        document.getElementById('modalKeyText').innerText = newPriv;
        modal.style.display = 'flex';

        const cleanup = () => {
            document.getElementById('copyKeyBtn').removeEventListener('click', copyHandler);
            document.getElementById('confirmKeyBtn').removeEventListener('click', confirmHandler);
            document.getElementById('closeModalBtn').removeEventListener('click', closeHandler);
            modal.style.display = 'none';
        };
        
        const copyHandler = () => { 
            navigator.clipboard.writeText(newPriv); 
            showToast('🔑 Ключ скопирован!'); 
        };
        
        const confirmHandler = async () => {
            cleanup();
            await publishProfile(newPriv, newPub, nickname.trim());
            goToMainScreen(newPriv, nickname.trim(), newPub);
        };
        
        const closeHandler = () => { cleanup(); };
        
        document.getElementById('copyKeyBtn').addEventListener('click', copyHandler);
        document.getElementById('confirmKeyBtn').addEventListener('click', confirmHandler);
        document.getElementById('closeModalBtn').addEventListener('click', closeHandler);
    }

    async function loginWithKey(nickname, privateKey) {
        const normalized = normalizePrivateKey(privateKey);
        if (!normalized) { showToast('❌ Неверный формат ключа', true); return; }
        const pub = getPublicKey(normalized);
        if (!pub) { showToast('❌ Ошибка восстановления публичного ключа', true); return; }
        
        await publishProfile(normalized, pub, nickname || `user_${pub.slice(0,6)}`);
        goToMainScreen(normalized, nickname || `user_${pub.slice(0,6)}`, pub);
    }

    async function handleLogin() {
        const nick = document.getElementById('regNickname').value.trim();
        const rawKey = document.getElementById('regPrivateKey').value.trim();
        
        if (!rawKey) { 
            await registerNewUser(nick); 
            return; 
        }
        await loginWithKey(nick, rawKey);
    }

    // Проверка авторизации при загрузке
    async function checkAutoLogin() {
        const storedPriv = localStorage.getItem('snh_priv');
        const storedNick = localStorage.getItem('snh_nick');
        if (storedPriv && isValidHex(storedPriv)) {
            const pub = getPublicKey(storedPriv);
            if (pub) {
                goToMainScreen(storedPriv, storedNick, pub);
                return true;
            }
        }
        return false;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const autoLogged = await checkAutoLogin();
        if (!autoLogged) {
            document.getElementById('loginActionBtn').addEventListener('click', handleLogin);
        }
    });
</script>
</body>
</html>
