<body class="day">
    <header class="site-header">
        <h1>Seti.kolokrug</h1>

        <div class="kolobok-grid" id="kolobokGrid"></div>

    <script>
        // ===== НАСТРОЙКИ JSONBIN.IO =====
        const BIN_ID = '69b6a5a4b7ec241ddc6e0ea2';
        const API_KEY = '$2a$10$C0R5Jnbb6cr4df/WnSQ0W.H.RQe.Nx38MfY36zsyOO2nr1l0dx0Z6';

        // ===== ВЕРИФИЦИРОВАННЫЕ ПОЛЬЗОВАТЕЛИ =====
        let verifiedUsers = new Set(['BUBLEMERC', 'KacERORga']);

        function isVerified(username) {
            return verifiedUsers.has(username);
        }

        function getVerifiedBadge(username) {
            return isVerified(username) ? '<span class="verified-badge">✓</span>' : '';
        }

        // ===== ЗАГРУЗКА ЗАПРЕЩЁННЫХ СЛОВ =====
        let BANNED_WORDS = [];

        async function loadBannedWordsFromFile() {
            try {
                const response = await fetch('banned_words.txt');
                const text = await response.text();
                BANNED_WORDS = text.split('\n')
                    .map(line => line.trim().toLowerCase())
                    .filter(word => word.length > 0 && !word.startsWith('//'));
                
                console.log(`Загружено ${BANNED_WORDS.length} запрещённых слов`);
                document.getElementById('bannedWordsCount').textContent = `🚫 Загружено слов: ${BANNED_WORDS.length}`;
            } catch (error) {
                console.log('Не удалось загрузить banned_words.txt, используется пустой список');
                BANNED_WORDS = [];
                document.getElementById('bannedWordsCount').textContent = `🚫 Ошибка загрузки файла`;
            }
        }

        function reloadBannedWords() {
            loadBannedWordsFromFile();
            alert('Список запрещённых слов перезагружен!');
        }

        function containsBannedWords(text) {
            if (!text || BANNED_WORDS.length === 0) return false;
            const lowerText = text.toLowerCase();
            for (let word of BANNED_WORDS) {
                if (lowerText.includes(word)) {
                    console.log('Найдено запрещённое слово:', word);
                    return true;
                }
            }
            return false;
        }

        // ===== ОБЛАЧНОЕ ХРАНИЛИЩЕ JSONBIN =====
        let posts = [];
        let postsDisplayed = 20;
        let currentView = 'feed';
        let currentProfile = null;

        async function loadPostsFromCloud() {
            try {
                document.getElementById('dynamicContent').innerHTML = '<div class="loading">Загрузка постов...</div>';
                
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': API_KEY
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ошибка ${response.status}`);
                }
                
                const data = await response.json();
                posts = data.record.posts || [];
                console.log(`✅ Загружено ${posts.length} постов из облака`);
                
                posts.sort((a, b) => b.id - a.id);
                
                if (currentView === 'feed') showFeed();
                return posts;
            } catch (error) {
                console.error('❌ Ошибка загрузки из облака:', error);
                posts = [];
                if (currentView === 'feed') showFeed();
                return [];
            }
        }

        async function savePostsToCloud() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ posts: posts })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ошибка ${response.status}`);
                }
                
                console.log('✅ Посты сохранены в облако');
                return true;
            } catch (error) {
                console.error('❌ Ошибка сохранения в облако:', error);
                return false;
            }
        }

        // ===== ПОЛЬЗОВАТЕЛИ И ПАРОЛИ =====
        const ADMIN_USERNAMES = ['BUBLEMERC', 'KacERORga'];

        function handleLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const errorDiv = document.getElementById('loginError');

            if (!username || !password) {
                errorDiv.textContent = 'Введите имя и пароль';
                return;
            }

            if (ADMIN_USERNAMES.includes(username)) {
                if (password !== ADMIN_PASSWORD) {
                    errorDiv.textContent = 'Неверный пароль';
                    return;
                }
                localStorage.setItem('isAdmin', 'true');
            } else {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                
                if (users[username]) {
                    if (password !== users[username].password) {
                        errorDiv.textContent = 'Неверный пароль';
                        return;
                    }
                } else {
                    users[username] = {
                        password: password,
                        kolobok: '🍞',
                        created: new Date().toISOString()
                    };
                    localStorage.setItem('users', JSON.stringify(users));
                }
                localStorage.setItem('isAdmin', 'false');
            }

            localStorage.setItem('username', username);
            
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            if (users[username] && users[username].kolobok) {
                document.getElementById('userKolobok').textContent = users[username].kolobok;
            }

            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            const badge = isVerified(username) ? '<span class="verified-badge">✓</span>' : '';
            document.getElementById('displayUsername').innerHTML = '@' + username + ' ' + badge;
            
            if (ADMIN_USERNAMES.includes(username)) {
                document.getElementById('adminPanel').classList.add('visible');
            }
            
            loadSubscriptions();
            loadPostsFromCloud();
        }

        function acceptPrivacy() {
            document.getElementById('privacyPopup').classList.add('hidden');
        }

        let subscriptions = new Set();

        function loadSubscriptions() {
            const saved = localStorage.getItem('subs_' + localStorage.getItem('username'));
            if (saved) subscriptions = new Set(JSON.parse(saved));
        }

        function saveSubscriptions() {
            localStorage.setItem('subs_' + localStorage.getItem('username'), JSON.stringify([...subscriptions]));
        }

        function toggleSubscribe(username) {
            const currentUser = localStorage.getItem('username');
            
            if (username === currentUser) {
                alert('Нельзя подписаться на самого себя');
                return;
            }
            
            if (subscriptions.has(username)) {
                subscriptions.delete(username);
            } else {
                subscriptions.add(username);
            }
            saveSubscriptions();
            refreshView();
        }

        let currentImage = null;
        let currentVideo = null;

        function previewImage() {
            const file = document.getElementById('imageUpload').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    document.getElementById('mediaPreview').innerHTML = `
                        <img src="${currentImage}" class="image-preview">
                        <button class="media-button" onclick="removeImage()">❌ Убрать</button>
                    `;
                };
                reader.readAsDataURL(file);
            }
        }

        function previewVideo() {
            const file = document.getElementById('videoUpload').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentVideo = e.target.result;
                    document.getElementById('mediaPreview').innerHTML = `
                        <video src="${currentVideo}" class="video-player" controls></video>
                        <button class="media-button" onclick="removeVideo()">❌ Убрать</button>
                    `;

                reader.readAsDataURL(file);

        function removeImage() {
            currentImage = null;
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('imageUpload').value = '';
        }

        function removeVideo() {
            currentVideo = null;
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('videoUpload').value = '';
        }

        async function createPost() {
            const content = document.getElementById('postContent').value.trim();
            const username = localStorage.getItem('username');
            
            if (!username) {
                alert('Сначала войдите в систему');
                return;
            }
            
            if (containsBannedWords(content)) {
                alert('⚠️ Пост содержит запрещённые выражения и не может быть опубликован');
                return;
            }
            
            if (!content && !currentImage && !currentVideo) {
                alert('Напишите что-нибудь или добавьте медиа!');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const userKolobok = users[username]?.kolobok || '🍞';

            const newPost = {
                id: Date.now(),
                author: username,
                authorKolobok: userKolobok,
                content: content || '',
                image: currentImage,
                video: currentVideo,
                likes: {},
                comments: [],
                time: 'только что'
            };

            posts.unshift(newPost);
            await savePostsToCloud();
            
            document.getElementById('postContent').value = '';
            document.getElementById('mediaPreview').innerHTML = '';
            currentImage = null;
            currentVideo = null;
            
            showFeed();
        }

        async function toggleLike(postId) {
            const post = posts.find(p => p.id == postId);
            const username = localStorage.getItem('username');
            
            if (post && username) {
                if (!post.likes) post.likes = {};
                
                if (post.likes[username]) {
                    delete post.likes[username];
                } else {
                    post.likes[username] = true;
                }
                
                await savePostsToCloud();
                refreshView();
            }
        }

        function getLikesCount(post) {
            if (!post.likes) return 0;
            return Object.keys(post.likes).length;
        }

        function userLiked(post) {
            const username = localStorage.getItem('username');
            return post.likes && post.likes[username];
        }

        function refreshView() {
            if (currentView === 'feed') showFeed();
            else if (currentView === 'subscriptions') showSubscriptions();
            else if (currentView === 'profile') showProfile(currentProfile);
        }

        function showFeed() {
            currentView = 'feed';
            document.getElementById('feedBtn').classList.add('active');
            document.getElementById('subscriptionsBtn').classList.remove('active');
            
            if (posts.length === 0) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div class="welcome-message">
                        <div class="kolobok-big">🍞</div>
                        <h2>Добро пожаловать в Kolocrug!</h2>
                        <p>Пока здесь пусто — будьте первым, кто напишет пост!</p>
                        <p style="font-size: 1rem;">Напишите что-нибудь в форме выше 👆</p>
                    </div>
                `;
                return;
            }
            
            renderFeed();
        }

        function showSubscriptions() {
            currentView = 'subscriptions';
            document.getElementById('feedBtn').classList.remove('active');
            document.getElementById('subscriptionsBtn').classList.add('active');
            
            const subPosts = posts.filter(p => subscriptions.has(p.author));
            
            if (subscriptions.size === 0 || subPosts.length === 0) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div style="text-align: center; color: white; padding: 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 60px;">
                        <h2 style="margin-bottom: 20px;">😢 Нет постов от подписок</h2>
                        <button class="nav-button" onclick="showFeed()">В ленту</button>
                    </div>
                `;
                return;
            }

            let html = '<div class="feed">';
            subPosts.slice(0, postsDisplayed).forEach(post => {
                const badge = getVerifiedBadge(post.author);
                html += `
                    <div class="post-card">
                        <div class="post-header" onclick="showProfile('${post.author}')">
                            <div class="kolobok-small">${post.authorKolobok || '🍞'}</div>
                            <div>
                                <div class="post-author">@${post.author} ${badge}</div>
                                <div class="post-time">${post.time}</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function showProfile(username) {
            currentView = 'profile';
            currentProfile = username;
            
            const userPosts = posts.filter(p => p.author === username);
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const userKolobok = users[username]?.kolobok || '🍞';
            const badge = getVerifiedBadge(username);
            
            let html = `
                <div class="profile-header">
                    <div class="profile-avatar">${userKolobok}</div>
                    <div>
                        <h2>@${username} ${badge}</h2>
                        <p>Постов: ${userPosts.length}</p>
                        <p style="margin-top: 10px;">Колобок: ${userKolobok}</p>
                    </div>
                </div>
                <div class="feed">
            `;

            if (userPosts.length === 0) {
                html += `<p style="color: white; text-align: center;">Пока нет постов</p>`;
            } else {
                userPosts.slice(0, 10).forEach(post => {
                    html += `<div class="post-card">${post.content}</div>`;
                });
            }

            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function renderFeed() {
            let html = '<div class="grid"><div class="feed">';
            const username = localStorage.getItem('username');

            posts.slice(0, postsDisplayed).forEach(post => {
                const badge = getVerifiedBadge(post.author);
                const likesCount = getLikesCount(post);
                const liked = userLiked(post);
                
                let mediaHtml = '';
                if (post.image) {
                    mediaHtml += `<div class="post-media"><img src="${post.image}" class="post-image" onclick="window.open('${post.image}')"></div>`;
                }
                if (post.video) {
                    mediaHtml += `<div class="post-media"><video src="${post.video}" class="video-player" controls></video></div>`;
                }
                
                const repostLabel = post.isRepost ? 
                    `<div class="repost-label">🔄 репостнул(а) @${post.originalAuthor}</div>` : '';
                
                const repostButton = (post.author !== username) ? 
                    `<span class="repost-button" onclick="repost(${post.id})">🔄 Репост</span>` : '';
                
                const subscribeButton = (post.author !== username) ? 
                    `<span class="subscribe-button" onclick="toggleSubscribe('${post.author}')">
                        ${subscriptions.has(post.author) ? '✓ Подписан' : '+ Подписаться'}
                    </span>` : '';
                
                const deleteButton = (post.author === username || ADMIN_USERNAMES.includes(username)) ? 
                    `<div class="delete-button" onclick="deletePost(${post.id})">✕</div>` : '';

                html += `
                    <div class="post-card">
                        ${deleteButton}
                        <div class="post-header" onclick="showProfile('${post.author}')">
                            <div class="kolobok-small">${post.authorKolobok || '🍞'}</div>
                            <div>
                                <div class="post-author">@${post.author} ${badge}</div>
                                <div class="post-time">${post.time}</div>
                            </div>
                        </div>
                        ${repostLabel}
                        <div class="post-content">${post.content}</div>
                        ${mediaHtml}
                        <div class="post-stats">
                            <span class="like-button ${liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                ❤️ ${likesCount}
                            </span>
                            <span class="comment-button" onclick="toggleComments(${post.id})">
                                💬 ${post.comments.length}
                            </span>
                            ${subscribeButton}
                            ${repostButton}
                        </div>
                        <div class="comments-section" id="comments-${post.id}" style="display: none;">
                            ${post.comments.map(c => {
                                const commentBadge = getVerifiedBadge(c.author);
                                return `
                                    <div class="comment">
                                        <div class="comment-author" onclick="showProfile('${c.author}')">
                                            <span class="kolobok-small">🍞</span> @${c.author} ${commentBadge}
                                        </div>
                                        <div>${c.text}</div>
                                    </div>
                                `;
                            }).join('')}
                            <div class="comment-input">
                                <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий...">
                                <button onclick="addComment(${post.id})">Отправить</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="sidebar">
                        <div class="sidebar-card">
                            <h3>👥 Активные пользователи</h3>
                            ${[...new Set(posts.map(p => p.author))].slice(0, 5).map(u => {
                                const users = JSON.parse(localStorage.getItem('users') || '{}');
                                const kolobok = users[u]?.kolobok || '🍞';
                                const badge = getVerifiedBadge(u);
                                return `
                                    <div style="margin: 10px 0; cursor: pointer;" onclick="showProfile('${u}')">
                                        ${kolobok} @${u} ${badge}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
                ${posts.length > postsDisplayed ? `
                    <div class="load-more">
                        <button onclick="loadMore()">⬇️ Ещё посты</button>
                    </div>
                ` : ''}
            `;

            document.getElementById('dynamicContent').innerHTML = html;
        }

        function toggleComments(postId) {
            const div = document.getElementById(`comments-${postId}`);
            if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
        }

        async function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            const username = localStorage.getItem('username');
            
            if (text) {
                if (containsBannedWords(text)) {
                    alert('⚠️ Комментарий содержит запрещённые выражения');
                    return;
                }
                
                const post = posts.find(p => p.id == postId);
                post.comments.push({
                    author: username,
                    text: text
                });
                await savePostsToCloud();
                refreshView();
                input.value = '';
            }
        }

        async function deletePost(postId) {
            if (confirm('Удалить этот пост?')) {
                posts = posts.filter(p => p.id != postId);
                await savePostsToCloud();
                refreshView();
            }
        }

        async function repost(postId) {
            const originalPost = posts.find(p => p.id == postId);
            const username = localStorage.getItem('username');
            
            if (!username) {
                alert('Сначала войдите в систему');
                return;
            }

            if (originalPost.author === username) {
                alert('Нельзя репостнуть свой собственный пост');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '{}');
            const userKolobok = users[username]?.kolobok || '🍞';

            const repostPost = {
                id: Date.now(),
                author: username,
                authorKolobok: userKolobok,
                content: originalPost.content,
                image: originalPost.image,
                video: originalPost.video,
                likes: {},
                comments: [],
                time: 'только что',
                isRepost: true,
                originalAuthor: originalPost.author
            };

            posts.unshift(repostPost);
            await savePostsToCloud();
            refreshView();
        }

        function loadMore() {
            postsDisplayed += 20;
            refreshView();
        }

        function previewGradient(timeOfDay) {
            document.body.className = timeOfDay;
        }

        async function clearAllPosts() {
            if (confirm('Удалить все посты? Это действие нельзя отменить.')) {
                posts = [];
                postsDisplayed = 20;
                await savePostsToCloud();
                showFeed();
            }
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('isAdmin');
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('visible');
        }

        function updateTime() {
            const hours = new Date().getHours();
            document.getElementById('timeInfo').textContent = hours + ':00';
            
            if (hours >= 6 && hours < 12) document.body.className = 'morning';
            else if (hours >= 12 && hours < 18) document.body.className = 'day';
            else if (hours >= 18 && hours < 21) document.body.className = 'sunset';
            else document.body.className = 'night';
        }

        window.onload = async function() {
            await loadBannedWordsFromFile();
            
            document.getElementById('privacyPopup').classList.remove('hidden');
            
            if (localStorage.getItem('username')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                const username = localStorage.getItem('username');
                const badge = isVerified(username) ? '<span class="verified-badge">✓</span>' : '';
                document.getElementById('displayUsername').innerHTML = '@' + username + ' ' + badge;
                
                if (ADMIN_USERNAMES.includes(username)) {
                    document.getElementById('adminPanel').classList.add('visible');
                }
                
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                if (users[username] && users[username].kolobok) {
                    document.getElementById('userKolobok').textContent = users[username].kolobok;
                }
                
                loadSubscriptions();
                await loadPostsFromCloud();
            }
            
            updateTime();
            setInterval(updateTime, 60000);
        };
    </script>
</body>
</html>
