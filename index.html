<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOK Соцсеть — вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Анимированные фоновые шары -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <div class="container">
        <div class="auth-box">
            <div class="logo-wrapper">
                <div class="logo-icon">SOK</div>
                <h1>SOK Соцсеть</h1>
                <p>от KacERORga Prokaznicaet Corporated</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('login')">Вход</button>
                <button class="tab-btn" onclick="showTab('register')">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div id="login-form" class="form-container active">
                <div class="input-group">
                    <input type="text" id="login-username" placeholder=" ">
                    <label>Имя пользователя</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder=" ">
                    <label>Пароль</label>
                </div>
                <button class="glow-btn" onclick="login()">Войти</button>
                <div id="login-error" class="error"></div>
            </div>

            <!-- Форма регистрации -->
            <div id="register-form" class="form-container">
                <div class="input-group">
                    <input type="text" id="reg-username" placeholder=" ">
                    <label>Имя пользователя</label>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder=" ">
                    <label>Ваше имя</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" placeholder=" ">
                    <label>Пароль</label>
                </div>
                <button class="glow-btn" onclick="register()">Зарегистрироваться</button>
                <div id="reg-error" class="error"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
