<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolocrug — соцсеть колобков</title>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            transition: background 1.5s ease, color 0.3s ease;
            color: #1d1c1f;
        }

        /* Стандартные градиенты */
        body.morning {
            background: radial-gradient(circle at 20% 30%, rgba(200, 220, 255, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(180, 210, 255, 0.7) 0%, transparent 40%),
                        linear-gradient(145deg, #d4e4ff, #b5d0ff);
        }
        body.day {
            background: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.9) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(100, 180, 255, 0.6) 0%, transparent 50%),
                        linear-gradient(145deg, #a0d0ff, #7bb3ff);
        }
        body.sunset {
            background: radial-gradient(circle at 30% 40%, rgba(255, 180, 130, 0.6) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 140, 170, 0.5) 0%, transparent 50%),
                        linear-gradient(145deg, #ffb88c, #ffb3c6);
        }
        body.night {
            background: radial-gradient(circle at 20% 30%, rgba(70, 90, 180, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(50, 40, 110, 0.5) 0%, transparent 50%),
                        linear-gradient(145deg, #1a1f35, #131a2c);
            color: #f0f0f0;
        }

        .site-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.2rem 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .site-header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Политика */
        .privacy-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .privacy-popup.hidden { display: none; }
        .privacy-card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            color: white;
        }
        .privacy-button.accept {
            background: #1DA1F2;
            border: none;
            padding: 15px 40px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Модалка входа */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9000;
        }
        .login-card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .login-card input, .login-card button {
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            border-radius: 60px;
        }
        .login-card input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .login-card button {
            background: #1DA1F2;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Основной контент */
        .main-content { display: none; }

        .top-bar {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .kolobok {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .kolobok-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .verified-badge {
            background: #1DA1F2;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .nav-button.active {
            background: rgba(255,255,255,0.3);
        }

        /* ===== АДМИН-ПАНЕЛЬ ===== */
        .admin-panel {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            border: 2px solid #f1c40f;
            border-radius: 60px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
            display: none; /* Скрыта по умолчанию */
        }
        .admin-panel.visible {
            display: block; /* Показываем только админам */
        }
        .admin-panel h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #f1c40f;
        }
        .admin-section {
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .admin-section h4 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #f1c40f;
        }
        .preview-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .preview-button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        .preview-button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .preview-button.active {
            background: #f1c40f;
            color: #1a1a1a;
            border-color: #f1c40f;
        }
        .color-input {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            color: white;
            margin: 10px 0;
        }
        .range-slider {
            width: 100%;
            margin: 15px 0;
        }
        .admin-button {
            background: #f1c40f;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        /* Посты */
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }
        .feed { grid-column: 1; }
        .post-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            color: white;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .post-author { font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .post-time { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .like-button, .comment-button { cursor: pointer; }
        .liked { color: #ff6b6b; }

        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255,215,0,0.3);
        }
        .comment {
            background: rgba(0,0,0,0.2);
            border-radius: 60px;
            padding: 15px;
            margin: 10px 0;
        }
        .comment-author {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .sidebar-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            color: white;
        }

        .post-form {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .post-form textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            color: white;
            margin-bottom: 15px;
        }
        .post-form button {
            background: rgba(255,215,0,0.3);
            border: 1px solid rgba(255,215,0,0.4);
            color: white;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
        }

        .profile-header {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 30px;
            color: white;
        }

        .load-more {
            text-align: center;
            margin: 30px 0;
        }
        .load-more button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
        }

        .logout-button {
            background: rgba(231,76,60,0.3);
            border: 1px solid rgba(231,76,60,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
    </style>
</head>
<body class="day">
    <header class="site-header">
        <h1>Seti.kolokrug</h1>
    </header>

    <!-- Политика -->
    <div class="privacy-popup" id="privacyPopup">
        <div class="privacy-card">
            <h2>🍞 Политика конфиденциальности</h2>
            <p>Мы используем куки для работы сайта</p>
            <button class="privacy-button accept" onclick="acceptPrivacy()">Принять</button>
        </div>
    </div>

    <!-- Вход -->
    <div class="login-modal" id="loginModal">
        <div class="login-card">
            <h2>👋 Вход в Kolocrug</h2>
            <input type="text" id="usernameInput" placeholder="Ваш username">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button onclick="handleLogin()">Войти</button>
            <div id="loginError" style="color: #ff6b6b; text-align: center;"></div>
        </div>
    </div>

    <!-- Основное -->
    <div class="main-content" id="mainContent">
        <div class="container">
            <div class="top-bar">
                <div class="user-info" style="display: flex; align-items: center; gap: 15px;">
                    <div class="kolobok">🍞</div>
                    <div class="username" id="displayUsername"></div>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="time-info" id="timeInfo">⏰</div>
                    <div class="nav-buttons">
                        <button class="nav-button active" id="feedBtn" onclick="showFeed()">Лента</button>
                        <button class="nav-button" id="subscriptionsBtn" onclick="showSubscriptions()">Подписки</button>
                        <button class="nav-button" onclick="showProfile(localStorage.getItem('username'))">Профиль</button>
                    </div>
                    <button class="logout-button" onclick="logout()">Выйти</button>
                </div>
            </div>

            <!-- АДМИН-ПАНЕЛЬ - по умолчанию скрыта -->
            <div class="admin-panel" id="adminPanel">
                <h3>⚡ Админ-панель</h3>
                
                <!-- РЕЖИМ ПРЕВЬЮ -->
                <div class="admin-section">
                    <h4>🎨 Режим превью</h4>
                    
                    <div class="preview-controls">
                        <button class="preview-button" onclick="previewGradient('morning')">🌅 Утро</button>
                        <button class="preview-button" onclick="previewGradient('day')">☀️ День</button>
                        <button class="preview-button" onclick="previewGradient('sunset')">🌇 Закат</button>
                        <button class="preview-button" onclick="previewGradient('night')">🌃 Ночь</button>
                    </div>

                    <div style="margin-top: 20px;">
                        <h4>🎨 Цвета</h4>
                        <input type="color" id="primaryColor" class="color-input" value="#1DA1F2" onchange="changeColor('primary', this.value)">
                        <label>Основной цвет</label>
                        
                        <input type="color" id="accentColor" class="color-input" value="#FFD700" onchange="changeColor('accent', this.value)">
                        <label>Акцентный цвет</label>
                    </div>

                    <div style="margin-top: 20px;">
                        <h4>🔄 Прозрачность</h4>
                        <input type="range" class="range-slider" min="0.1" max="0.9" step="0.1" value="0.15" onchange="changeOpacity(this.value)">
                        <span id="opacityValue">0.15</span>
                    </div>

                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <button class="admin-button" onclick="saveDesign()">💾 Сохранить</button>
                        <button class="admin-button" onclick="resetDesign()">↺ Сбросить</button>
                    </div>
                </div>

                <!-- Другие функции -->
                <div class="admin-section">
                    <h4>⚙️ Управление</h4>
                    <button class="admin-button" onclick="clearAllPosts()">🗑️ Удалить все посты</button>
                    <button class="admin-button" onclick="generateNewPosts()">🔄 Новые посты</button>
                </div>
            </div>

            <div id="dynamicContent"></div>
        </div>
    </div>

    <script>
        // ===== ПОЛИТИКА =====
        function acceptPrivacy() {
            document.getElementById('privacyPopup').classList.add('hidden');
        }

        // ===== АДМИНЫ (ТОЛЬКО ЭТИ ДВА) =====
        const ADMIN_USERNAMES = ['BUBLEMERC', 'KacERORga'];
        const ADMIN_PASSWORD = '6369';

        // ===== ВЕРИФИКАЦИЯ =====
        let verifiedUsers = new Set(['cyberphoenix', 'neonwolf', 'BUBLEMERC', 'KacERORga']);

        // ===== ПОДПИСКИ =====
        let subscriptions = new Set();

        function loadSubscriptions() {
            const saved = localStorage.getItem('subs_' + localStorage.getItem('username'));
            if (saved) subscriptions = new Set(JSON.parse(saved));
        }

        function saveSubscriptions() {
            localStorage.setItem('subs_' + localStorage.getItem('username'), JSON.stringify([...subscriptions]));
        }

        function toggleSubscribe(username) {
            if (subscriptions.has(username)) subscriptions.delete(username);
            else subscriptions.add(username);
            saveSubscriptions();
            refreshView();
        }

        // ===== ГЕНЕРАЦИЯ ПОСТОВ =====
        const usernames = [
            'cyberphoenix', 'neonwolf', 'quantum', 'cosmic', 'shadow', 'BUBLEMERC', 'KacERORga',
            'alice', 'bob', 'charlie', 'dave', 'eve', 'frank', 'grace', 'heidi'
        ];

        function generateRealisticPost(index) {
            const topics = [
                'фотография', 'путешествия', 'музыка', 'кино', 'книги', 'спорт', 'еда', 'технологии', 'искусство', 'наука',
                'йога', 'психология', 'бизнес', 'крипто', 'AI', 'космос', 'авто', 'фитнес', 'рецепты', 'кафе'
            ];
            
            const templates = [
                (t) => `Сегодня отличный день для ${t}!`,
                (t) => `Новый пост про ${t}, всем советую`,
                (t) => `Как вам ${t} в 2026?`,
                (t) => `Люблю ${t}, это моё хобби`,
                (t) => `Кто тоже увлекается ${t}?`,
                (t) => `Мой опыт в ${t} за последний месяц`,
                (t) => `Лучшие книги про ${t}`,
                (t) => `${t} меняет жизнь к лучшему`,
                (t) => `Обсудим ${t} в комментариях`,
                (t) => `Ищу друзей для ${t}`
            ];
            
            const topic = topics[index % topics.length];
            const template = templates[index % templates.length];
            return template(topic) + ' #' + topic;
        }

        let posts = [];
        let postsDisplayed = 20;
        let currentView = 'feed';
        let currentProfile = null;

        function generatePosts(count = 500) {
            const newPosts = [];
            for (let i = 0; i < count; i++) {
                const author = usernames[Math.floor(Math.random() * usernames.length)];
                const content = generateRealisticPost(i);
                
                const comments = [];
                for (let j = 0; j < Math.floor(Math.random() * 4); j++) {
                    comments.push({
                        author: usernames[Math.floor(Math.random() * usernames.length)],
                        text: `Согласен про ${content.split('#')[1] || 'это'}!`
                    });
                }

                newPosts.push({
                    id: i + Date.now(),
                    author,
                    content,
                    likes: Math.floor(Math.random() * 200) + 10,
                    liked: false,
                    comments,
                    time: Math.floor(Math.random() * 60) + ' мин назад'
                });
            }
            return newPosts.sort(() => Math.random() - 0.5);
        }

        posts = generatePosts(800);

        // ===== АДМИН-ФУНКЦИИ =====
        function previewGradient(timeOfDay) {
            document.body.className = timeOfDay;
        }

        function changeColor(type, color) {
            if (type === 'primary') {
                document.querySelectorAll('.privacy-button.accept, .login-card button').forEach(el => {
                    el.style.backgroundColor = color;
                });
            } else if (type === 'accent') {
                document.querySelectorAll('.kolobok, .kolobok-small').forEach(el => {
                    el.style.background = `linear-gradient(145deg, ${color}, ${color})`;
                });
            }
        }

        function changeOpacity(value) {
            document.getElementById('opacityValue').textContent = value;
            document.querySelectorAll('.post-card, .sidebar-card, .post-form, .profile-header').forEach(el => {
                el.style.backgroundColor = `rgba(255, 255, 255, ${value})`;
            });
        }

        function saveDesign() {
            alert('Дизайн сохранён!');
        }

        function resetDesign() {
            document.body.className = 'day';
            document.getElementById('primaryColor').value = '#1DA1F2';
            document.getElementById('accentColor').value = '#FFD700';
            document.querySelector('.range-slider').value = '0.15';
            document.getElementById('opacityValue').textContent = '0.15';
            changeOpacity('0.15');
            alert('Дизайн сброшен!');
        }

        function generateNewPosts() {
            posts = generatePosts(800);
            showFeed();
            alert('Сгенерировано 800 новых постов!');
        }

        // ===== ОСНОВНЫЕ ФУНКЦИИ =====
        function refreshView() {
            if (currentView === 'feed') showFeed();
            else if (currentView === 'subscriptions') showSubscriptions();
            else if (currentView === 'profile') showProfile(currentProfile);
        }

        function showFeed() {
            currentView = 'feed';
            document.getElementById('feedBtn').classList.add('active');
            document.getElementById('subscriptionsBtn').classList.remove('active');
            renderFeed();
        }

        function showSubscriptions() {
            currentView = 'subscriptions';
            document.getElementById('feedBtn').classList.remove('active');
            document.getElementById('subscriptionsBtn').classList.add('active');
            renderSubscriptions();
        }

        function showProfile(username) {
            currentView = 'profile';
            currentProfile = username;
            renderProfile();
        }

        function renderFeed() {
            let html = `
                <div class="post-form">
                    <textarea id="postContent" placeholder="Что нового?" rows="3"></textarea>
                    <button onclick="createPost()">Опубликовать</button>
                </div>
                <div class="grid">
                    <div class="feed">
            `;

            posts.slice(0, postsDisplayed).forEach(post => {
                const verified = verifiedUsers.has(post.author) ? '<span class="verified-badge">✓</span>' : '';
                
                html += `
                    <div class="post-card">
                        <div class="post-header" onclick="showProfile('${post.author}')">
                            <div class="kolobok-small">🍞</div>
                            <div>
                                <div class="post-author">@${post.author} ${verified}</div>
                                <div class="post-time">${post.time}</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-stats">
                            <span class="like-button ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                ❤️ ${post.likes}
                            </span>
                            <span class="comment-button" onclick="toggleComments(${post.id})">
                                💬 ${post.comments.length}
                            </span>
                        </div>
                        <div class="comments-section" id="comments-${post.id}" style="display: none;">
                            ${post.comments.map(c => `
                                <div class="comment">
                                    <div class="comment-author" onclick="showProfile('${c.author}')">
                                        <span class="kolobok-small">🍞</span> @${c.author}
                                    </div>
                                    <div>${c.text}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="sidebar">
                        <div class="sidebar-card">
                            <h3>🔥 Активные</h3>
                            ${usernames.slice(0, 5).map(u => `
                                <div style="margin: 10px 0; cursor: pointer;" onclick="showProfile('${u}')">
                                    🍞 @${u}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                <div class="load-more">
                    <button onclick="loadMore()">⬇️ Ещё посты</button>
                </div>
            `;

            document.getElementById('dynamicContent').innerHTML = html;
        }

        function renderSubscriptions() {
            const subPosts = posts.filter(p => subscriptions.has(p.author));
            
            if (subscriptions.size === 0) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div style="text-align: center; color: white; padding: 50px;">
                        <h2>😢 Нет подписок</h2>
                        <button class="nav-button" onclick="showFeed()">В ленту</button>
                    </div>
                `;
                return;
            }

            let html = '<div class="feed">';
            subPosts.slice(0, postsDisplayed).forEach(post => {
                html += `<div class="post-card">@${post.author}: ${post.content}</div>`;
            });
            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function renderProfile() {
            const userPosts = posts.filter(p => p.author === currentProfile);
            
            let html = `
                <div class="profile-header">
                    <div class="profile-avatar">🍞</div>
                    <div>
                        <h2>@${currentProfile} ${verifiedUsers.has(currentProfile) ? '<span class="verified-badge">✓</span>' : ''}</h2>
                        <p>Постов: ${userPosts.length}</p>
                    </div>
                </div>
                <div class="feed">
            `;

            userPosts.slice(0, 10).forEach(post => {
                html += `<div class="post-card">${post.content}</div>`;
            });

            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id == postId);
            if (post) {
                post.liked = !post.liked;
                post.likes += post.liked ? 1 : -1;
                refreshView();
            }
        }

        function toggleComments(postId) {
            const div = document.getElementById(`comments-${postId}`);
            if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
        }

        function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (content) {
                posts.unshift({
                    id: Date.now(),
                    author: localStorage.getItem('username'),
                    content: content,
                    likes: 0,
                    liked: false,
                    comments: [],
                    time: 'только что'
                });
                refreshView();
            }
        }

        function loadMore() {
            postsDisplayed += 20;
            refreshView();
        }

        function clearAllPosts() {
            if (confirm('Удалить все посты?')) {
                posts = [];
                refreshView();
            }
        }

        // ===== ВХОД (ИСПРАВЛЕНО - админка только для двоих) =====
        function handleLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            if (!username) {
                document.getElementById('loginError').textContent = 'Введите username';
                return;
            }

            // Проверка для админов
            if (ADMIN_USERNAMES.includes(username)) {
                if (password !== ADMIN_PASSWORD) {
                    document.getElementById('loginError').textContent = 'Неверный пароль';
                    return;
                }
                // Админ прошёл проверку
                localStorage.setItem('isAdmin', 'true');
            } else {
                // Обычный пользователь - пароль не проверяем (можно оставить пустым)
                localStorage.setItem('isAdmin', 'false');
            }

            localStorage.setItem('username', username);
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('displayUsername').innerHTML = '@' + username + (verifiedUsers.has(username) ? '<span class="verified-badge">✓</span>' : '');
            
            // ПОКАЗЫВАЕМ АДМИНКУ ТОЛЬКО ДЛЯ BUBLEMERC И KacERORga
            const adminPanel = document.getElementById('adminPanel');
            if (ADMIN_USERNAMES.includes(username)) {
                adminPanel.classList.add('visible');  // Показываем админку
                console.log('Админка показана для', username);
            } else {
                adminPanel.classList.remove('visible'); // Скрываем для всех остальных
                console.log('Админка скрыта для', username);
            }
            
            loadSubscriptions();
            showFeed();
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('isAdmin');
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('visible'); // Скрываем админку при выходе
        }

        // ===== ВРЕМЯ =====
        function updateTime() {
            const hours = new Date().getHours();
            document.getElementById('timeInfo').textContent = hours + ':00';
            
            if (hours >= 6 && hours < 12) document.body.className = 'morning';
            else if (hours >= 12 && hours < 18) document.body.className = 'day';
            else if (hours >= 18 && hours < 21) document.body.className = 'sunset';
            else document.body.className = 'night';
        }

        // ===== ЗАПУСК =====
        window.onload = function() {
            document.getElementById('privacyPopup').classList.remove('hidden');
            
            if (localStorage.getItem('username')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('displayUsername').textContent = '@' + localStorage.getItem('username');
                
                // Проверяем при загрузке - показываем админку только админам
                const username = localStorage.getItem('username');
                if (ADMIN_USERNAMES.includes(username)) {
                    document.getElementById('adminPanel').classList.add('visible');
                }
                
                loadSubscriptions();
                showFeed();
            }
            
            updateTime();
            setInterval(updateTime, 60000);
        };
    </script>
</body>
</html>
