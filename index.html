<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SNH - Социальная сеть</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <h2>SNH</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="feed">
                    <span class="icon">📱</span>
                    <span>Лента</span>
                </li>
                <li class="nav-item" data-page="explore">
                    <span class="icon">🔍</span>
                    <span>Поиск</span>
                </li>
                <li class="nav-item" data-page="upload">
                    <span class="icon">➕</span>
                    <span>Загрузить</span>
                </li>
                <li class="nav-item" data-page="notifications">
                    <span class="icon">❤️</span>
                    <span>Уведомления</span>
                </li>
                <li class="nav-item" data-page="profile">
                    <span class="icon">👤</span>
                    <span>Профиль</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Feed Page -->
            <div id="feed-page" class="page active">
                <div class="feed-container">
                    <div class="feed-header">
                        <h1>Для вас</h1>
                        <div class="feed-tabs">
                            <button class="tab-btn active">Рекомендации</button>
                            <button class="tab-btn">Подписки</button>
                        </div>
                    </div>
                    <div class="videos-grid" id="videos-grid">
                        <!-- Videos will be loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- Explore Page -->
            <div id="explore-page" class="page">
                <div class="explore-container">
                    <div class="search-bar">
                        <input type="text" placeholder="Поиск пользователей, видео, хэштегов..." id="search-input">
                        <button id="search-btn">🔍</button>
                    </div>
                    <div class="trending-hashtags">
                        <h3>Актуальные хэштеги</h3>
                        <div class="hashtags-list" id="hashtags-list"></div>
                    </div>
                    <div class="explore-grid" id="explore-grid"></div>
                </div>
            </div>

            <!-- Upload Page -->
            <div id="upload-page" class="page">
                <div class="upload-container">
                    <h2>Загрузить видео</h2>
                    <div class="upload-area" id="upload-area">
                        <div class="upload-icon">📹</div>
                        <p>Нажмите или перетащите видео для загрузки</p>
                        <input type="file" id="video-upload" accept="video/*" hidden>
                        <button class="upload-btn" id="trigger-upload">Выбрать видео</button>
                    </div>
                    <div class="upload-preview" id="upload-preview" style="display:none;">
                        <video id="preview-video" controls></video>
                        <div class="upload-details">
                            <input type="text" placeholder="Описание видео" id="video-description">
                            <input type="text" placeholder="Хэштеги (через пробел)" id="video-hashtags">
                            <button id="publish-btn">Опубликовать</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Notifications Page -->
            <div id="notifications-page" class="page">
                <div class="notifications-container">
                    <h2>Уведомления</h2>
                    <div id="notifications-list">
                        <div class="notification-placeholder">
                            Здесь будут ваши уведомления
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profile Page -->
            <div id="profile-page" class="page">
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <div class="avatar-placeholder">👤</div>
                        </div>
                        <div class="profile-info">
                            <h2 id="profile-name">Пользователь</h2>
                            <p id="profile-username">@user</p>
                            <div class="profile-stats">
                                <div><strong id="followers-count">0</strong> подписчиков</div>
                                <div><strong id="following-count">0</strong> подписок</div>
                                <div><strong id="videos-count">0</strong> видео</div>
                            </div>
                            <button class="edit-profile-btn" id="edit-profile-btn">Редактировать профиль</button>
                        </div>
                    </div>
                    <div class="profile-tabs">
                        <button class="profile-tab active" data-tab="videos">Видео</button>
                        <button class="profile-tab" data-tab="liked">Понравилось</button>
                    </div>
                    <div class="profile-videos-grid" id="profile-videos"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <video id="modal-video" controls></video>
            <div class="video-info">
                <div class="video-user">
                    <strong id="modal-username">@user</strong>
                    <button class="follow-btn">Подписаться</button>
                </div>
                <p id="modal-description"></p>
                <div class="video-actions">
                    <button class="like-btn">❤️ <span id="modal-likes">0</span></button>
                    <button class="comment-btn">💬 <span id="modal-comments">0</span></button>
                    <button class="share-btn">📤 Поделиться</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
