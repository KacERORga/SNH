<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolocrug — соцсеть колобков</title>
    <style>
        /* Все стили без изменений */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            transition: background 1.5s ease;
            color: #1d1c1f;
        }

        body.morning {
            background: radial-gradient(circle at 20% 30%, rgba(200, 220, 255, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(180, 210, 255, 0.7) 0%, transparent 40%),
                        linear-gradient(145deg, #d4e4ff, #b5d0ff);
        }
        body.day {
            background: radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.9) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(100, 180, 255, 0.6) 0%, transparent 50%),
                        linear-gradient(145deg, #a0d0ff, #7bb3ff);
        }
        body.sunset {
            background: radial-gradient(circle at 30% 40%, rgba(255, 180, 130, 0.6) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 140, 170, 0.5) 0%, transparent 50%),
                        linear-gradient(145deg, #ffb88c, #ffb3c6);
        }
        body.night {
            background: radial-gradient(circle at 20% 30%, rgba(70, 90, 180, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(50, 40, 110, 0.5) 0%, transparent 50%),
                        linear-gradient(145deg, #1a1f35, #131a2c);
            color: #f0f0f0;
        }

        .site-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.2rem 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .site-header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Политика */
        .privacy-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .privacy-popup.hidden { display: none; }
        .privacy-card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            color: white;
        }
        .privacy-button.accept {
            background: #1DA1F2;
            border: none;
            padding: 15px 40px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Модалка входа */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9000;
        }
        .login-card {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .login-card h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            color: white;
        }
        .login-card button {
            width: 100%;
            padding: 15px;
            background: #1DA1F2;
            border: none;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Основной контент */
        .main-content { display: none; }

        .top-bar {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .kolobok {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .kolobok-small {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .verified-badge {
            background: #1DA1F2;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .nav-button.active {
            background: rgba(255,255,255,0.3);
        }

        /* ===== АДМИН-ПАНЕЛЬ ===== */
        .admin-panel {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            border: 2px solid #f1c40f;
            border-radius: 60px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
            display: none;
        }
        .admin-panel.visible {
            display: block;
        }
        .admin-panel h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #f1c40f;
        }
        .admin-section {
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .admin-section h4 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #f1c40f;
        }
        .preview-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .preview-button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .admin-button {
            background: #f1c40f;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        /* ===== ФОРМА СОЗДАНИЯ ПОСТА ===== */
        .post-form {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .post-form textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 40px;
            color: white;
            margin-bottom: 15px;
            resize: vertical;
        }
        .post-form textarea::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        /* Медиа-загрузка */
        .media-upload {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .media-button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .media-button:hover {
            background: rgba(255,255,255,0.2);
        }
        .media-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid #FFD700;
        }
        .video-preview {
            width: 200px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .post-form button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            color: #1a1a1a;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .post-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        /* Посты */
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }
        .feed { grid-column: 1; }
        .post-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            color: white;
            position: relative;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .post-author { font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .post-time { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        
        /* Кнопка удаления */
        .delete-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(231, 76, 60, 0.3);
            border: 1px solid rgba(231, 76, 60, 0.4);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .delete-button:hover {
            background: rgba(231, 76, 60, 0.5);
            transform: scale(1.1);
        }
        
        /* Репост метка */
        .repost-label {
            display: inline-block;
            background: rgba(29,161,242,0.2);
            border: 1px solid rgba(29,161,242,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: #1DA1F2;
        }
        
        /* Медиа в постах */
        .post-media {
            margin: 15px 0;
        }
        .post-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 30px;
            cursor: pointer;
        }
        .post-video {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 30px;
        }
        
        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .like-button, .comment-button, .subscribe-button, .repost-button {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .liked { color: #ff6b6b; }

        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255,215,0,0.3);
        }
        .comment {
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            padding: 15px;
            margin: 10px 0;
        }
        .comment-author {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 5px;
        }
        .comment-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .comment-input input {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            color: white;
        }
        .comment-input button {
            background: #FFD700;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .sidebar-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            color: white;
        }

        .profile-header {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 30px;
            color: white;
        }

        .load-more {
            text-align: center;
            margin: 30px 0;
        }
        .load-more button {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
        }

        .logout-button {
            background: rgba(231,76,60,0.3);
            border: 1px solid rgba(231,76,60,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
        }

        .welcome-message {
            text-align: center;
            color: white;
            padding: 60px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            margin: 30px 0;
        }
        .welcome-message h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .welcome-message p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .welcome-message .kolobok-big {
            font-size: 5rem;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="day">
    <header class="site-header">
        <h1>Seti.kolokrug</h1>
    </header>

    <!-- Политика -->
    <div class="privacy-popup" id="privacyPopup">
        <div class="privacy-card">
            <h2>🍞 Политика конфиденциальности</h2>
            <p>Мы используем куки для работы сайта</p>
            <button class="privacy-button accept" onclick="acceptPrivacy()">Принять</button>
        </div>
    </div>

    <!-- Вход -->
    <div class="login-modal" id="loginModal">
        <div class="login-card">
            <h2>👋 Вход в Kolocrug</h2>
            <input type="text" id="usernameInput" placeholder="Ваш username">
            <input type="password" id="passwordInput" placeholder="Пароль (для админов)">
            <button onclick="handleLogin()">Войти</button>
            <div id="loginError" style="color: #ff6b6b; text-align: center;"></div>
        </div>
    </div>

    <!-- Основное -->
    <div class="main-content" id="mainContent">
        <div class="container">
            <div class="top-bar">
                <div class="user-info" style="display: flex; align-items: center; gap: 15px;">
                    <div class="kolobok">🍞</div>
                    <div class="username" id="displayUsername"></div>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="time-info" id="timeInfo">⏰</div>
                    <div class="nav-buttons">
                        <button class="nav-button active" id="feedBtn" onclick="showFeed()">Лента</button>
                        <button class="nav-button" id="subscriptionsBtn" onclick="showSubscriptions()">Подписки</button>
                        <button class="nav-button" onclick="showProfile(localStorage.getItem('username'))">Профиль</button>
                    </div>
                    <button class="logout-button" onclick="logout()">Выйти</button>
                </div>
            </div>

            <!-- АДМИН-ПАНЕЛЬ -->
            <div class="admin-panel" id="adminPanel">
                <h3>⚡ Админ-панель</h3>
                
                <div class="admin-section">
                    <h4>🎨 Режим превью</h4>
                    <div class="preview-controls">
                        <button class="preview-button" onclick="previewGradient('morning')">🌅 Утро</button>
                        <button class="preview-button" onclick="previewGradient('day')">☀️ День</button>
                        <button class="preview-button" onclick="previewGradient('sunset')">🌇 Закат</button>
                        <button class="preview-button" onclick="previewGradient('night')">🌃 Ночь</button>
                    </div>
                </div>

                <div class="admin-section">
                    <h4>⚙️ Управление</h4>
                    <button class="admin-button" onclick="clearAllPosts()">🗑️ Удалить все посты</button>
                </div>
            </div>

            <!-- ===== ФОРМА СОЗДАНИЯ ПОСТА ===== -->
            <div class="post-form">
                <textarea id="postContent" placeholder="Что нового?" rows="3"></textarea>
                
                <!-- Кнопки загрузки медиа -->
                <div class="media-upload">
                    <label class="media-button">
                        📷 Фото
                        <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="previewImage()">
                    </label>
                    <label class="media-button">
                        🎥 Видео (ссылка)
                        <input type="text" id="videoUrl" placeholder="https://youtu.be/..." style="display: none;">
                    </label>
                    <button class="media-button" onclick="showVideoInput()">➕ Вставить ссылку</button>
                </div>

                <!-- Превью загруженных медиа -->
                <div class="media-preview" id="mediaPreview"></div>

                <button onclick="createPost()">Опубликовать</button>
            </div>

            <!-- ДИНАМИЧЕСКИЙ КОНТЕНТ -->
            <div id="dynamicContent">
                <!-- Приветственное сообщение при первом входе -->
                <div class="welcome-message">
                    <div class="kolobok-big">🍞</div>
                    <h2>Добро пожаловать в Kolocrug!</h2>
                    <p>Пока здесь пусто — будьте первым, кто напишет пост!</p>
                    <p style="font-size: 1rem;">Напишите что-нибудь в форме выше 👆</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== ФУНКЦИЯ ДЛЯ ПРАВИЛЬНЫХ ОКОНЧАНИЙ =====
        function pluralLikes(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'лайк';
            if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return 'лайка';
            return 'лайков';
        }

        function pluralComments(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'комментарий';
            if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return 'комментария';
            return 'комментариев';
        }

        // ===== ПОЛИТИКА =====
        function acceptPrivacy() {
            document.getElementById('privacyPopup').classList.add('hidden');
        }

        // ===== АДМИНЫ =====
        const ADMIN_USERNAMES = ['BUBLEMERC', 'KacERORga'];
        const ADMIN_PASSWORD = '6369';

        // ===== ВЕРИФИКАЦИЯ =====
        let verifiedUsers = new Set(['BUBLEMERC', 'KacERORga']);

        // ===== ПОДПИСКИ (ИСПРАВЛЕНО - НЕЛЬЗЯ НА СЕБЯ) =====
        let subscriptions = new Set();

        function loadSubscriptions() {
            const saved = localStorage.getItem('subs_' + localStorage.getItem('username'));
            if (saved) subscriptions = new Set(JSON.parse(saved));
        }

        function saveSubscriptions() {
            localStorage.setItem('subs_' + localStorage.getItem('username'), JSON.stringify([...subscriptions]));
        }

        function toggleSubscribe(username) {
            const currentUser = localStorage.getItem('username');
            
            // Запрещаем подписку на самого себя
            if (username === currentUser) {
                alert('Нельзя подписаться на самого себя');
                return;
            }
            
            if (subscriptions.has(username)) {
                subscriptions.delete(username);
            } else {
                subscriptions.add(username);
            }
            saveSubscriptions();
            refreshView();
        }

        // ===== МАССИВ ПОСТОВ =====
        let posts = [];
        let postsDisplayed = 20;
        let currentView = 'feed';
        let currentProfile = null;

        // ===== ПЕРЕМЕННЫЕ ДЛЯ МЕДИА =====
        let currentImage = null;
        let currentVideo = null;

        // ===== ЗАГРУЗКА ПОСТОВ ИЗ LOCALSTORAGE =====
        function loadPosts() {
            const saved = localStorage.getItem('posts');
            if (saved) {
                posts = JSON.parse(saved);
            } else {
                posts = [];
            }
        }

        function savePosts() {
            localStorage.setItem('posts', JSON.stringify(posts));
        }

        // Загружаем посты при старте
        loadPosts();

        // ===== ФУНКЦИИ ДЛЯ МЕДИА =====
        function previewImage() {
            const file = document.getElementById('imageUpload').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    const preview = document.getElementById('mediaPreview');
                    preview.innerHTML = `
                        <img src="${currentImage}" class="image-preview">
                        <button class="media-button" onclick="removeImage()">❌ Убрать</button>
                    `;
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            currentImage = null;
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('imageUpload').value = '';
        }

        function showVideoInput() {
            const url = prompt('Вставьте ссылку на видео (YouTube, Vimeo, Rutube):');
            if (url) {
                if (url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo') || url.includes('rutube')) {
                    currentVideo = url;
                    const preview = document.getElementById('mediaPreview');
                    preview.innerHTML = `
                        <div class="video-preview">
                            🎥 Видео добавлено
                            <button class="media-button" onclick="removeVideo()">❌ Убрать</button>
                        </div>
                    `;
                } else {
                    alert('Пожалуйста, вставьте ссылку на YouTube, Vimeo или Rutube');
                }
            }
        }

        function removeVideo() {
            currentVideo = null;
            document.getElementById('mediaPreview').innerHTML = '';
        }

        // ===== ФУНКЦИИ ОТОБРАЖЕНИЯ =====
        function refreshView() {
            if (currentView === 'feed') showFeed();
            else if (currentView === 'subscriptions') showSubscriptions();
            else if (currentView === 'profile') showProfile(currentProfile);
        }

        function showFeed() {
            currentView = 'feed';
            document.getElementById('feedBtn').classList.add('active');
            document.getElementById('subscriptionsBtn').classList.remove('active');
            
            if (posts.length === 0) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div class="welcome-message">
                        <div class="kolobok-big">🍞</div>
                        <h2>Добро пожаловать в Kolocrug!</h2>
                        <p>Пока здесь пусто — будьте первым, кто напишет пост!</p>
                        <p style="font-size: 1rem;">Напишите что-нибудь в форме выше 👆</p>
                    </div>
                `;
                return;
            }
            
            renderFeed();
        }

        function showSubscriptions() {
            currentView = 'subscriptions';
            document.getElementById('feedBtn').classList.remove('active');
            document.getElementById('subscriptionsBtn').classList.add('active');
            
            const subPosts = posts.filter(p => subscriptions.has(p.author));
            
            if (subscriptions.size === 0 || subPosts.length === 0) {
                document.getElementById('dynamicContent').innerHTML = `
                    <div style="text-align: center; color: white; padding: 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 60px;">
                        <h2 style="margin-bottom: 20px;">😢 Нет постов от подписок</h2>
                        <button class="nav-button" onclick="showFeed()">В ленту</button>
                    </div>
                `;
                return;
            }

            let html = '<div class="feed">';
            subPosts.slice(0, postsDisplayed).forEach(post => {
                const verified = verifiedUsers.has(post.author) ? '<span class="verified-badge">✓</span>' : '';
                html += `
                    <div class="post-card">
                        <div class="post-header" onclick="showProfile('${post.author}')">
                            <div class="kolobok-small">🍞</div>
                            <div>
                                <div class="post-author">@${post.author} ${verified}</div>
                                <div class="post-time">${post.time}</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function showProfile(username) {
            currentView = 'profile';
            currentProfile = username;
            
            const userPosts = posts.filter(p => p.author === username);
            
            let html = `
                <div class="profile-header">
                    <div class="profile-avatar">🍞</div>
                    <div>
                        <h2>@${username} ${verifiedUsers.has(username) ? '<span class="verified-badge">✓</span>' : ''}</h2>
                        <p>Постов: ${userPosts.length}</p>
                    </div>
                </div>
                <div class="feed">
            `;

            if (userPosts.length === 0) {
                html += `<p style="color: white; text-align: center;">Пока нет постов</p>`;
            } else {
                userPosts.slice(0, 10).forEach(post => {
                    html += `<div class="post-card">${post.content}</div>`;
                });
            }

            html += '</div>';
            document.getElementById('dynamicContent').innerHTML = html;
        }

        function renderFeed() {
            let html = '<div class="grid"><div class="feed">';
            const username = localStorage.getItem('username');

            posts.slice(0, postsDisplayed).forEach(post => {
                const verified = verifiedUsers.has(post.author) ? '<span class="verified-badge">✓</span>' : '';
                
                const likesText = `${post.likes} ${pluralLikes(post.likes)}`;
                const commentsText = `${post.comments.length} ${pluralComments(post.comments.length)}`;
                
                // Генерируем HTML для медиа, если есть
                let mediaHtml = '';
                if (post.image) {
                    mediaHtml += `<div class="post-media"><img src="${post.image}" class="post-image" onclick="window.open('${post.image}')"></div>`;
                }
                if (post.video) {
                    let videoUrl = post.video;
                    if (videoUrl.includes('youtu.be')) {
                        const videoId = videoUrl.split('/').pop();
                        videoUrl = `https://www.youtube.com/embed/${videoId}`;
                    } else if (videoUrl.includes('youtube.com/watch')) {
                        const videoId = new URL(videoUrl).searchParams.get('v');
                        videoUrl = `https://www.youtube.com/embed/${videoId}`;
                    } else if (videoUrl.includes('vimeo.com')) {
                        const videoId = videoUrl.split('/').pop();
                        videoUrl = `https://player.vimeo.com/video/${videoId}`;
                    }
                    mediaHtml += `<div class="post-media"><iframe src="${videoUrl}" class="post-video" allowfullscreen></iframe></div>`;
                }
                
                // Метка репоста
                const repostLabel = post.isRepost ? 
                    `<div class="repost-label">🔄 репостнул(а) @${post.originalAuthor}</div>` : '';
                
                // Кнопка репоста (только на чужих постах)
                const repostButton = (post.author !== username) ? 
                    `<span class="repost-button" onclick="repost(${post.id})">🔄 Репост</span>` : '';
                
                // Кнопка подписки (НЕ показываем на своих постах)
                const subscribeButton = (post.author !== username) ? 
                    `<span class="subscribe-button" onclick="toggleSubscribe('${post.author}')">
                        ${subscriptions.has(post.author) ? '✓ Подписан' : '+ Подписаться'}
                    </span>` : '';
                
                // Кнопка удаления (только для своих постов)
                const deleteButton = (post.author === username) ? 
                    `<div class="delete-button" onclick="deletePost(${post.id})">✕</div>` : '';

                html += `
                    <div class="post-card">
                        ${deleteButton}
                        <div class="post-header" onclick="showProfile('${post.author}')">
                            <div class="kolobok-small">🍞</div>
                            <div>
                                <div class="post-author">@${post.author} ${verified}</div>
                                <div class="post-time">${post.time}</div>
                            </div>
                        </div>
                        ${repostLabel}
                        <div class="post-content">${post.content}</div>
                        ${mediaHtml}
                        <div class="post-stats">
                            <span class="like-button ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                ❤️ ${likesText}
                            </span>
                            <span class="comment-button" onclick="toggleComments(${post.id})">
                                💬 ${commentsText}
                            </span>
                            ${subscribeButton}
                            ${repostButton}
                        </div>
                        <div class="comments-section" id="comments-${post.id}" style="display: none;">
                            ${post.comments.map(c => `
                                <div class="comment">
                                    <div class="comment-author" onclick="showProfile('${c.author}')">
                                        <span class="kolobok-small">🍞</span> @${c.author}
                                    </div>
                                    <div>${c.text}</div>
                                </div>
                            `).join('')}
                            <div class="comment-input">
                                <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий...">
                                <button onclick="addComment(${post.id})">Отправить</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="sidebar">
                        <div class="sidebar-card">
                            <h3>👥 Активные пользователи</h3>
                            ${[...new Set(posts.map(p => p.author))].slice(0, 5).map(u => `
                                <div style="margin: 10px 0; cursor: pointer;" onclick="showProfile('${u}')">
                                    🍞 @${u}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                ${posts.length > postsDisplayed ? `
                    <div class="load-more">
                        <button onclick="loadMore()">⬇️ Ещё посты</button>
                    </div>
                ` : ''}
            `;

            document.getElementById('dynamicContent').innerHTML = html;
        }

        // ===== ДЕЙСТВИЯ =====
        function toggleLike(postId) {
            const post = posts.find(p => p.id == postId);
            if (post) {
                if (post.liked) {
                    post.likes--;
                } else {
                    post.likes++;
                }
                post.liked = !post.liked;
                savePosts();
                refreshView();
            }
        }

        function toggleComments(postId) {
            const div = document.getElementById(`comments-${postId}`);
            if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
        }

        function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            const username = localStorage.getItem('username') || 'anonymous';
            
            if (text) {
                const post = posts.find(p => p.id == postId);
                post.comments.push({
                    author: username,
                    text: text
                });
                savePosts();
                refreshView();
                input.value = '';
            }
        }

        // ===== УДАЛЕНИЕ ПОСТА =====
        function deletePost(postId) {
            if (confirm('Удалить этот пост?')) {
                posts = posts.filter(p => p.id != postId);
                savePosts();
                refreshView();
            }
        }

        // ===== РЕПОСТ =====
        function repost(postId) {
            const originalPost = posts.find(p => p.id == postId);
            const username = localStorage.getItem('username');
            
            if (!username) {
                alert('Сначала войдите в систему');
                return;
            }

            if (originalPost.author === username) {
                alert('Нельзя репостнуть свой собственный пост');
                return;
            }

            const repostPost = {
                id: Date.now(),
                author: username,
                content: originalPost.content,
                image: originalPost.image,
                video: originalPost.video,
                likes: 0,
                liked: false,
                comments: [],
                time: 'только что',
                isRepost: true,
                originalAuthor: originalPost.author
            };

            posts.unshift(repostPost);
            savePosts();
            refreshView();
        }

        // ===== СОЗДАНИЕ ПОСТА =====
        function createPost() {
            const content = document.getElementById('postContent').value.trim();
            const username = localStorage.getItem('username');
            
            if (!username) {
                alert('Сначала войдите в систему');
                return;
            }
            
            if (!content && !currentImage && !currentVideo) {
                alert('Напишите что-нибудь или добавьте медиа!');
                return;
            }

            const newPost = {
                id: Date.now(),
                author: username,
                content: content || '',
                image: currentImage,
                video: currentVideo,
                likes: 0,
                liked: false,
                comments: [],
                time: 'только что'
            };

            posts.unshift(newPost);
            savePosts();
            
            document.getElementById('postContent').value = '';
            document.getElementById('mediaPreview').innerHTML = '';
            currentImage = null;
            currentVideo = null;
            
            showFeed();
        }

        function loadMore() {
            postsDisplayed += 20;
            refreshView();
        }

        // ===== АДМИН-ФУНКЦИИ =====
        function previewGradient(timeOfDay) {
            document.body.className = timeOfDay;
        }

        function clearAllPosts() {
            if (confirm('Удалить все посты? Это действие нельзя отменить.')) {
                posts = [];
                postsDisplayed = 20;
                savePosts();
                showFeed();
            }
        }

        // ===== ВХОД =====
        function handleLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            if (!username) {
                document.getElementById('loginError').textContent = 'Введите username';
                return;
            }

            if (ADMIN_USERNAMES.includes(username)) {
                if (password !== ADMIN_PASSWORD) {
                    document.getElementById('loginError').textContent = 'Неверный пароль';
                    return;
                }
                localStorage.setItem('isAdmin', 'true');
            } else {
                localStorage.setItem('isAdmin', 'false');
            }

            localStorage.setItem('username', username);
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('displayUsername').innerHTML = '@' + username + (verifiedUsers.has(username) ? '<span class="verified-badge">✓</span>' : '');
            
            const adminPanel = document.getElementById('adminPanel');
            if (ADMIN_USERNAMES.includes(username)) {
                adminPanel.classList.add('visible');
            } else {
                adminPanel.classList.remove('visible');
            }
            
            loadSubscriptions();
            
            if (posts.length === 0) {
                showFeed();
            } else {
                showFeed();
            }
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('isAdmin');
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('visible');
        }

        // ===== ВРЕМЯ =====
        function updateTime() {
            const hours = new Date().getHours();
            document.getElementById('timeInfo').textContent = hours + ':00';
            
            if (hours >= 6 && hours < 12) document.body.className = 'morning';
            else if (hours >= 12 && hours < 18) document.body.className = 'day';
            else if (hours >= 18 && hours < 21) document.body.className = 'sunset';
            else document.body.className = 'night';
        }

        // ===== ЗАПУСК =====
        window.onload = function() {
            document.getElementById('privacyPopup').classList.remove('hidden');
            
            if (localStorage.getItem('username')) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('displayUsername').textContent = '@' + localStorage.getItem('username');
                
                const username = localStorage.getItem('username');
                if (ADMIN_USERNAMES.includes(username)) {
                    document.getElementById('adminPanel').classList.add('visible');
                }
                
                loadSubscriptions();
                
                if (posts.length === 0) {
                    showFeed();
                } else {
                    showFeed();
                }
            }
            
            updateTime();
            setInterval(updateTime, 60000);
        };
    </script>
</body>
</html>
